---
- name: '{{ ansible_name_module }} | Ensure the cluster bucket_iam_role '
  ansible.builtin.assert:
    that:
      - bucket_iam_role is defined and bucket_iam_role != ""
    msg: " the bucket_iam_role must be set and valid "

- name: '{{ ansible_name_module }} | Ensure the cluster bucket_iam_role '
  ansible.builtin.assert:
    that:
      - bucket_name is defined and bucket_name != ""
    msg: " the bucket_name must be set and valid "

- name: Display passed in ARN information
  ansible.builtin.debug:
    var: bucket_iam_role
    verbosity: 2

- name: Get caller identity to confirm credentials are valid
  amazon.aws.aws_caller_info:
  register: caller_info

- name: Display caller identity information
  ansible.builtin.debug:
    var: caller_info
    verbosity: 2

- name: Display caller identity information
  ansible.builtin.debug:
    msg:
      - "AWS credential verification successful."
      - "Account: {{ caller_info.account }}"
      - "User ID: {{ caller_info.user_id }}"
      - "ARN: {{ caller_info.arn }}"

