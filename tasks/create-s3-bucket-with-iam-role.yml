- name: '{{ ansible_name_module }} | Create an S3 bucket using the temp assumed role'
  amazon.aws.s3_bucket:
    name: "{{ bucket_name }}" 
    state: present
    region: "{{ aws_region }}" 
    #aws_access_key: "{{ assumed_role.sts_creds.access_key }}"
