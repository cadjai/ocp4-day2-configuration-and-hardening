- name: '{{ ansible_name_module }} | create  loki s3  secret'
  ansible.builtin.shell: >
    {{ openshift_cli }} create secret generic {{ cluster_logging_storage_s3_secret }} \
       --from-literal=access_key_id={{ aws_access_key }} \
       --from-literal=access_key_secret={{ aws_access_secret }} \
       --from-literal=bucketnames={{ bucket_name }} \
       --from-literal=endpoint={{ aws_s3_endpoint  }} \
       --from-literal=region={{ aws_region }} \
       --from-literal=forcepathstyle='true' \
       -n {{ bucket_namespace }} --dry-run=client -o yaml \
       | oc replace -f - --force

  register: loki_s3_secret_created
  no_log: true

