- name: "Run AWS bucket creation logic"
  when: is_aws_environment | default(false) | bool
  block:
    - name: '{{ ansible_name_module }} | Import AWS S3 CA CM tasks'
      ansible.builtin.include_tasks: tasks/create-aws-s3-cm.yml 
      vars:
        s3_bucket_tls_ca_cm: '{{ cluster_logging_storage_tls_ca_cm }}'

- name: "Run AWS bucket creation logic"
  when: 
    - not is_aws_environment is defined or not is_aws_environment | bool 
  block:
    - name: '{{ ansible_name_module }} |Retrieve existing ConfigMap CM'
      ansible.builtin.command: >
        {{ openshift_cli }} get configmap {{ cluster_logging_storage_tls_ca_cm }} -n {{ bucket_namespace }}
      ignore_errors: yes
      register: logging_storage_ca_cm_exist

    - name: '{{ ansible_name_module }} | Delete Existing logging storage cm'
      ansible.builtin.command: >
        {{ openshift_cli }} delete configmap {{ cluster_logging_storage_tls_ca_cm }} -n {{ bucket_namespace }}
      ignore_errors: yes
      when:
        - logging_storage_ca_cm_exist.rc is defined
        - logging_storage_ca_cm_exist.rc == 0
      register: logging_storage_ca_cm_deleted

    - name: '{{ ansible_name_module }} | Creat CA logging storage CM using user-ca-bundle CM'
      ansible.builtin.include_tasks: ../roles/copy-user-ca-bundle-cm-into-new-ca-bundle/tasks/main.yml 
      vars:
        existing_ca_bundle_cm_name: 'user-ca-bundle'
        existing_ca_bundle_cm_namespace: 'openshift-config'
        new_ca_bundle_cm_name: '{{ cluster_logging_storage_tls_ca_cm }}'
        new_ca_bundle_cm_file: '{{ staging_dir }}/cluster-logging-storage-ca.yaml'
        new_ca_bundle_cm_namespace: '{{ bucket_namespace }}'
        new_ca_bundle_cert_key: "{{ cluster_logging_storage_tls_ca_cm_key | default('ca.crt', true) }}"
        create_new_ca_bundle_cm: 'true'
        update_new_ca_bundle_cm_namespace: 'true'
      register: logging_storage_ca_cm_created

